name: Deploy swais.in

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo ">>> Pulling latest code..."
            cd /home/ubuntu/swais-website
            git pull origin main

            echo ">>> Backend setup..."
            cd /home/ubuntu/swais-website/backend

            if [ ! -d "venv" ]; then
                echo "Creating virtual environment..."
                python3 -m venv venv
            fi

            source venv/bin/activate
            pip install -r requirements.txt
            deactivate

            echo ">>> Frontend setup..."
            cd /home/ubuntu/swais-website

            export NVM_DIR="$HOME/.nvm"
            source $NVM_DIR/nvm.sh
            nvm use 20

            npm install
            npm run build

            echo ">>> Restarting apps..."

            cd /home/ubuntu/swais-website/backend
            pm2 describe swais-backend > /dev/null 2>&1 \
              && pm2 restart swais-backend \
              || pm2 start "python run.py" --name swais-backend

            cd /home/ubuntu/swais-website
            pm2 describe swais-frontend > /dev/null 2>&1 \
              && pm2 restart swais-frontend \
              || pm2 start "npm start" --name swais-frontend

            pm2 save

            echo "Deploy complete!"
